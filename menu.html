<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>SOULJA Menu</title>

    <link
        rel="stylesheet"
        href="css/global.css">

    <link
        rel="stylesheet"
        href="css/components.css">

    <link
        rel="stylesheet"
        href="css/pages/menu.css">

    <!-- Poppins -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Material Icon -->

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
        rel="stylesheet">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#16508B">

<link rel="apple-touch-icon"
      href="assets/icons/icon-192.png">

</head>

<body>

<div class="container menu-page">

    <!-- ==========================
         HEADER
    =========================== -->

    <header class="menu-header">
        <a
            href="index.html"
            class="back-button">
                <img src="assets/arahkiri.svg" alt="back">
        </a>

        <img
            src="assets/souljaonly.svg"
            class="logo"
            alt="Soulja">

    </header>

    <!-- ==========================
         MAIN
    =========================== -->

    <main class="menu-main">
                <!-- ==========================
             SIDEBAR
        =========================== -->

        <aside class="menu-sidebar">

            <button
                class="category-item active"
                data-category="all">

                Semua <br/>Menu

            </button>

            <button
                class="category-item"
                data-category="black-coffee">

                Black <br/>Coffee

            </button>

            <button
                class="category-item"
                data-category="milk-based-coffee">

                Milk Based <br/>Coffee

            </button>

            <button
                class="category-item"
                data-category="es-kopi-susu">

                Es Kopi <br/>Susu

            </button>

            <button
                class="category-item"
                data-category="non-coffee">

                Non Coffee

            </button>

            <button
                class="category-item"
                data-category="mocktail-refreshment">

                Mocktail <br/>Refreshment

            </button>

            <button
                class="category-item"
                data-category="coffee">

                Sizzle Bakes

            </button>

            <button
                class="category-item"
                data-category="coffee">

                Snack

            </button>

        </aside>

        <!-- ==========================
             CONTENT
        =========================== -->

        <section class="menu-content">

            <div
                id="menuGrid"
                class="menu-grid">
                            </div>

        </section>

    </main>

    <!-- ======================================
         MENU CARD TEMPLATE
         (Generated by menu.js)
    ======================================= -->

    <!--

    Struktur card yang akan dibuat oleh menu.js

    <div class="menu-card">

        <div class="menu-image">

            <img src="...">

        </div>

        <div class="menu-info">

            <h3>Long Black</h3>

            <p class="menu-description">

                Coffee

            </p>

            <div class="menu-price">

                Rp 28.000

            </div>

        </div>

    </div>

    -->
    <!-- ======================================
         END CONTENT
    ======================================= -->

</div>

<!-- ==========================================
     CROSS SELL POPUP
========================================== -->

<div id="crossSellOverlay" class="crosssell-overlay">

    <div class="crosssell-popup">

        <!-- Drag Handle -->

        <div class="crosssell-handle"></div>

        <div class="crosssell-body">

            <!-- ==========================
                 IMAGE
            =========================== -->

            <div class="crosssell-image">

                <img
                    id="crossSellImage"
                    src=""
                    alt="Cross Sell">

            </div>

            <!-- ==========================
                 CONTENT
            =========================== -->

            <div class="crosssell-content">

                <h2 id="crossSellTitle">

                    Butter Croissant

                </h2>

                <div
                    id="crossSellPrice"
                    class="crosssell-price">

                    Rp25.000

                </div>

                <p
                    id="crossSellText"
                    class="crosssell-text">

                    Pelanggan yang membeli menu
                    <b>Espresso</b>
                    biasanya juga membeli
                    <b>Butter Croissant</b>.

                </p>

            </div>

        </div>

        <!-- ==========================
             BUTTON
        =========================== -->

        <div class="crosssell-action">

            <button
                id="crossSellCancel"
                class="btn-secondary">

                Tidak, Terima Kasih

            </button>

        </div>

    </div>

</div>

<!-- ======================================
     DATABASE
====================================== -->

<script src="js/database.js"></script>

<!-- ======================================
     CORE
====================================== -->

<script src="js/storage.js"></script>

<script src="js/components.js"></script>

<!-- ======================================
     PAGE
====================================== -->

<script src="js/pages/menu.js"></script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
        try {

            const registration =
                await navigator.serviceWorker.register("./sw.js");

            console.log("Service Worker Registered", registration);

        } catch (error) {

            console.error("Service Worker Error:", error);

        }
    });
}
</script>

</body>

</html>
